        .poem-text {

            line-height: 1.7;

            display: inline-block;
            max-width: 100%;
        }

        .poem-text p {
            margin: 4px 0;
        }
        
        .poem-text br {
            display: block;
            margin-top: 15px;
            content: "";
        }

        .date {
            font-size: 0.95rem;
            font-style: italic;
            color: #7c6f62;
            margin-top: 30px;
            text-align: center;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #4a3f35;
            cursor: pointer;
            padding: 10px;
            position: absolute;
            transition: transform 0.2s, color 0.2s;
        }

        .nav-btn:hover {
            color: #1e1915;
            transform: scale(1.15);
        }

        .prev-btn {
            left: 25px;
        }

        .next-btn {
            right: 25px;
        }

        footer {
            margin-top: auto;
            text-align: center;
            width: 100%;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a3f35;
            text-decoration: none;
            transition: color 0.2s, transform 0.2s;
        }

        .social-links a:hover {
            color: #1e1915;
            transform: translateY(-2px);
        }

        .copyright {
            font-size: 0.85rem;
            color: #6d5f52;
            letter-spacing: 0.5px;
        }
    </style>

    <script>
        const poems = [
            {
                title: "Ночь",
                date: "2018",
                lines: [
                    "Час, когда уже не рано,",
                    "Тот час, который всё спасёт.",
                    "И ворон в клюве лепестки шафрана",
                    "Несёт.",
                    "<br>",
                    "Умчится,",
                    "опадёт",
                    "оранже-жёлтовое солнце-шафран",
                    "В грубины испылённых улиц,",
                    "И вдруг взорвётся старый шрам:",
                    "Ну, здравствуй, мама, мы вернулись.",
                    "<br>",
                    "Вернулись, чтобы взять гитару,",
                    "Чтоб - снова к тёплым крышам,",
                    "Чтоб править, исправлять всё то, что притворится старым,",
                    "И песни — картавить.",
                    "<br>",
                    "Чеканить тонкие печати ",
                    "следов по жести крыш,",
                    "И разговаривать к рассвету",
                    "Всё тише, и тише."
                ]
            },
            {
                title: "Врата",
                date: "",
                lines: [
                    "Я провожал глазами толпы праздных",
                    "В меха и золото закованных людей.",
                    "Пред ними бездна врат зияла пастью,",
                    "Ощерившись обломками костей.",
                    "<br>",
                    "Я тихо пел, вдыхая слабой грудью,",
                    "С рукой протянутой у распростёртых врат.",
                    "Я ждал тот миг, когда вернутся люди,",
                    "Но не вернулся ни один из них назад."
                ]
            },
            {
                title: "На море скоро буря",
                date: "",
                lines: [
                    "На море скоро буря. Жёлтый свет,",
                    "И облака, похожие на горные массивы. ",
                    "Тонки, узорчаты мы были на просвет,",
                    "Немного холодны и дьявольски красивы. ",
                    "<br>",
                    "Держала шляпу ты от ветра за поля.",
                    "И даль молчала, гранями бликуя. ",
                    "Грустила ты специально для меня, ",
                    "Чтоб я тебя любил такую. ",
                    "<br>",
                    "Вернёмся мы, и серый плотный быт",
                    "Затмит нам полувзрачных звёзд свободу,",
                    "Но выстрел глаз твоих мне возвратит",
                    "Глубоко синюю морскую воду."
                ]
            },
            {
    title: "Я помню наступала ночь",
    date: "",
    lines: [
        "Я помню: наступала ночь. Свежело. ",
        "Камин угас. Горячий воздух стынул. ",
        "И я один, как тот среди фужеров, ",
        "Наполненный вином наполовину,",
        "<br>",
        "Забыт был кем-то у стола. Мы двое ",
        "Притихли за стеклянною витриной. ",
        "Исчезнул мир. Ни слова над водою, ",
        "Укрывшей белым саваном равнину. ",
        "<br>",
        "Я видел из окна снежинок луны,",
        "Я мерил взглядом воздуха лоскут,",
        "Струящийся сквозь белых вЕтров струны,",
        "Застывших в утомлении минут.",
        "<br>",
        "Я видел в полудиком полумраке",
        "Мерцающих за стёклами свечей",
        "Таинственные неземные знаки",
        "Плющом обвитых рыцарских мечей.",
        "<br>",
        "Я знал тогда, на грани злого утра,",
        "Как быть с собой. И, чёрт меня возьми,",
        "Беседовал со мною Заратустра,",
        "Зашедший чашку кофе взять взаймы.",
        "<br>",
        "И вился дым, вплетая серой ниткой",
        "Мой призрак в сон портретов и имён,",
        "И растворялся здесь же между плиткой",
        "И ветхим обмороженным окном.",
        "<br>",
        "Я помню зной зимы на дне, потоком",
        "Кипящий лютый дьявольский покой,",
        "Себя пред алтарём из синих окон",
        "Нависшего над чёрканой строкой,",
        "<br>",
        "И взгляд безумный на стекле оконном",
        "Потерянного цирком смехача,",
        "Ославленного звоном колокольным,",
        "Сгоравшего, как на ветру свеча."
    ]
},
{
    title: "Сон",
    date: "",
    lines: [
        "Гулкий зной, иссохли воды",
        "В голубой пыли. ",
        "Под травою дом без входа ",
        "В череве земли. ",
        "<br>",
        "В доме гость уснул незваный, ",
        "Жаром изнурен. ",
        "Под прохладными ветвями ",
        "Спит спокойно он. ",
        "<br>",
        "Приходила к дому гостья —  ",
        "Ничего сказать. ",
        "Приносила хлеба горсти",
        "На его кровать. ",
        "<br>",
        "Нету сил ему проснуться, ",
        "Выйти снова к ней. ",
        "Лишь слова сквозь тени льются",
        "Шелестом ветвей.",
        "<br>",
        "В тишине ночного сада ",
        "Ты ко мне приди, ",
        "Помолчим с тобой в прохладе ",
        "Горьких трав среди."
    ]
}
        ];

        let currentIndex = 0;

        function renderPoem(index) {
            const poem = poems[index];
            document.getElementById('poem-title').innerText = poem.title;
            document.getElementById('poem-date').innerText = poem.date ? poem.date : "";

            const contentDiv = document.getElementById('poem-content');
            contentDiv.innerHTML = poem.lines.map(line => {
                if (line === "<br>") return "<br>";
                return `<p>${line}</p>`;
            }).join('');
        }

        function nextPoem() {
            currentIndex = (currentIndex + 1) % poems.length;
            renderPoem(currentIndex);
        }

        function prevPoem() {
            currentIndex = (currentIndex - 1 + poems.length) % poems.length;
            renderPoem(currentIndex);
        }

        renderPoem(currentIndex);
    </script>
</body>
